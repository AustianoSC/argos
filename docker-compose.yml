services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: argos
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ARGOS_DATABASE_URL=postgresql+asyncpg://argos:argos_dev@postgres:5432/argos
    working_dir: /app
    command: ["alembic", "upgrade", "head"]
    profiles: ["migrate"]

volumes:
  pgdata:
