services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: argos
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    environment:
      - UPSTREAM_API_BASE=${UPSTREAM_API_BASE}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrate:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ARGOS_DATABASE_URL=postgresql+asyncpg://argos:argos_dev@postgres:5432/argos
    working_dir: /app
    command: ["alembic", "upgrade", "head"]
    profiles: ["migrate"]

volumes:
  pgdata:
