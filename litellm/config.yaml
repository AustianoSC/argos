model_list:
  # Product matching — higher accuracy, low volume
  - model_name: "match-model"
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_base: os.environ/UPSTREAM_API_BASE
      api_key: os.environ/UPSTREAM_API_KEY

  # Price extraction — high volume, lower cost
  - model_name: "extract-model"
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_base: os.environ/UPSTREAM_API_BASE
      api_key: os.environ/UPSTREAM_API_KEY

